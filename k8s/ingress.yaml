apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-api
  labels:
    app: api
spec:
  ingressClassName: nginx
  rules:
    - host: platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
